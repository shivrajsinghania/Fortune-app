<!DOCTYPE html>
<html>
<head>
  <title>Edit Profile • Fortune</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* CONTAINER */
    .container {
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 500;
    }

    /* PROFILE PREVIEW */
    .preview {
      text-align: center;
      margin-bottom: 20px;
    }

    .preview img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #4da6ff;
      object-fit: cover;
      box-shadow: 0 0 13px rgba(77,166,255,0.6);
    }

    /* INPUTS */
    .input-group {
      margin-bottom: 15px;
    }

    label {
      font-size: 13px;
      color: #aaa;
      display: block;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 14px;
    }

    input::placeholder {
      color: #aaa;
    }

    select {
      cursor: pointer;
    }

    /* FILE INPUT */
    input[type="file"] {
      background: none;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 12px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(135deg, #4da6ff, #0066ff);
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 5px 15px rgba(0,102,255,0.5);
    }

    /* BACK LINK */
    .back {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #aaa;
      text-decoration: none;
      font-size: 13px;
    }

    .back:hover {
      color: #fff;
    }

  </style>
</head>

<body>

  <div class="container">

    <h2>Edit Profile</h2>

    <!-- PROFILE PREVIEW -->
    <div class="preview">
      {% if profile and profile[5] %}
          <img src="/static/uploads/{{ profile[5] }}" class="{{ profile[6] if profile[6] else 'circle' }}">
      {% else %}
          <img src="/static/default.png" class="circle">
      {% endif %}
    </div>

    <form action="/profile/update" method="post" enctype="multipart/form-data">

      <div class="input-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ profile[2] if profile else ' ' }}">
      </div>

      <div class="input-group">
        <label>Bio</label>
        <input type="text" name="bio" value="{{ profile[3] if profile else ' ' }}">
      </div>

      <div class="input-group">
        <label>Website / Link</label>
        <input type="text" name="links" value="{{ profile[4] if profile else ' ' }}">
      </div>

      <div class="input-group">
        <label>Profile Shape</label>
        <select name="shape">
          <option value="circle">Circle</option>
          <option value="square">Square</option>
        </select>
      </div>

      <div class="input-group">
        <label>Upload Profile Picture</label>
        <input type="file" name="profile_pic" onchange="previewImage(event)">
      </div>

      <button type="submit">Save Changes</button>

    </form>

    <a href="/profile" class="back">← Back to Profile</a>

  </div>

  <!-- IMAGE PREVIEW SCRIPT -->
  <script>
    function previewImage(event) {
      const img = document.getElementById('previewImg');
      img.src = URL.createObjectURL(event.target.files[0]);
    }
  </script>

</body>
</html>
