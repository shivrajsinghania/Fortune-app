<!DOCTYPE html>
<html>
<head>
  <title>Edit Profile • Fortune</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* CONTAINER */
    .container {
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 500;
    }

    /* PROFILE PREVIEW */
    .preview {
      text-align: center;
      margin-bottom: 20px;
    }

    .preview img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #4da6ff;
      object-fit: cover;
      box-shadow: 0 0 13px rgba(77,166,255,0.6);
    }

    .preview img.square {
      border-radius: 10px;
    }

    /* INPUTS */
    .input-group {
      margin-bottom: 15px;
    }

    label {
      font-size: 13px;
      color: #aaa;
      display: block;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 14px;
    }

    input::placeholder {
      color: #aaa;
    }

    select {
      cursor: pointer;
    }

    /* FILE INPUT */
    input[type="file"] {
      background: none;
      padding: 5px 0;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 12px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(135deg, #4da6ff, #0066ff);
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 5px 15px rgba(0,102,255,0.5);
    }

    /* BACK LINK */
    .back {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #aaa;
      text-decoration: none;
      font-size: 13px;
    }

    .back:hover {
      color: #fff;
    }

    .error {
      color: #ff6b6b;
      text-align: center;
      margin-bottom: 15px;
      font-size: 12px;
    }

    .success {
      color: #51cf66;
      text-align: center;
      margin-bottom: 15px;
      font-size: 12px;
    }

  </style>
</head>

<body>

  <div class="container">

    <h2>Edit Profile</h2>

    <!-- PROFILE PREVIEW -->
    <div class="preview">
      {% if profile and profile[5] %}
          <img id="previewImg" src="/static/uploads/{{ profile[5] }}" class="{% if profile[6] %}{{ profile[6] }}{% else %}circle{% endif %}">
      {% else %}
          <img id="previewImg" src="/static/default.png" class="circle">
      {% endif %}
    </div>

    <form action="/profile/update" method="post" enctype="multipart/form-data">

      <div class="input-group">
        <label>Name</label>
        <input type="text" name="name" placeholder="Enter your name" value="{% if profile and profile[2] %}{{ profile[2] }}{% endif %}">
      </div>

      <div class="input-group">
        <label>Bio</label>
        <input type="text" name="bio" placeholder="Write something about you" value="{% if profile and profile[3] %}{{ profile[3] }}{% endif %}">
      </div>

      <div class="input-group">
        <label>Website / Link</label>
        <input type="text" name="links" placeholder="yourwebsite.com" value="{% if profile and profile[4] %}{{ profile[4] }}{% endif %}">
      </div>

      <div class="input-group">
        <label>Profile Shape</label>
        <select name="shape">
          <option value="circle" {% if profile and profile[6] == 'circle' %}selected{% endif %}>Circle</option>
          <option value="square" {% if profile and profile[6] == 'square' %}selected{% endif %}>Square</option>
        </select>
      </div>

      <div class="input-group">
        <label>Upload Profile Picture</label>
        <input type="file" name="profile_pic" accept="image/png,image/jpeg,image/jpg" onchange="previewImage(event)">
      </div>

      <button type="submit">Save Changes</button>

    </form>

    <a href="/profile" class="back">← Back to Profile</a>

  </div>

  <!-- IMAGE PREVIEW SCRIPT -->
  <script>
    function previewImage(event) {
      const img = document.getElementById('previewImg');
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    }
  </script>

</body>
</html>
