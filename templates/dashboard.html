<!DOCTYPE html>
<html>
  <head>
    <title>Fortune.com</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        margin: 0;
        font-family: Arial, Sans-Serif;
        background-color: #f4f6f9;
      }
      .navbar {
        background-color: #111;
        color: white;
        padding: 15px;
        font-size: 20px;
        font-weight: bold;
        text-align: center;
      }
      .main {
        padding: 20px;
        padding-bottom: 70px;
      }
      .Welcome {
        font-size: 22px;
        margin-bottom: 20px;
      }
      .cards {
        display: flex;
        flex-wrap: wrap;
      }
      .card {
        background-color: white;
        color: black;
        padding: 20px;
        margin: 10px;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        flex: 1 1 40%;
      }
      .card:hover {
        transform: scale(1.02);
      }
      .bottom-nav {
        position: fixed;
        background-color: #111;
        bottom: 0;
        width: 100%;
        display: flex;
        justify-content: space-around;
        padding: 10px 0;
      }
      .logoutbtn {
        position: absolute;
        right: 15px;
        top: 15px;
      }
      .logoutBtn {
        background-color: black;
        color: white;
        border: 1px solid white;
        border-radius: 2px;
      }
      .bottom-nav a {
        color: white;
        text-decoration: none;
        text-align: center;
        font-size: 14px;
      }
      .bottom-nav a:hover {
        color: #00ffcc;
      }
    </style>
  </head>
  <body>
    <!----Top navbar--->
    <div class="navbar">
      Fortune🚀
      <div class="logoutbtn">
        <form id="logoutForm" action="/logout" method="post">
          <button type="button" class="logoutBtn" onclick="confirmLogout()">Logout!</button>
        </form>
      </div>
      <div id="loader" style=display:none;>
        Logging out...
      </div>
    </div>
    
    <!----Main Content--->
    <div class="main">
      <div class="Welcome">
        <strong>Welcome {{username}}👋!</strong>
      </div>
      
      <div class="cards">
        <div class="card">
          <h3>Total post</h3>
          <p>0</p>
        </div>
        <div class="card">
          <h3>Followers</h3>
          <p>0</p>
        </div>
        <div class="card">
          <h3>Earnings</h3>
          <p>$0.00</p>
        </div>
        <div class="card">
          <h3>Engagement</h3>
          <p>0%</p>
        </div>
      </div>
    </div>
    
    <!---Bottom navigation---->
    <div class="bottom-nav">
      <a href="/feed" onclick="navigate(event, '/feed')">🏠<br>Home</a>
      <a href="#">📊<br>Stats</a>
      <a href="/create-post" onclick="navigate(event, '/create-post')">➕<br>Post</a>
      <a href="">📩<br>Send</a>
      <a href="/profile" onclick="navigate(event, '/profile')">👤<br>Profile</a>
    </div>
    <script>
      function confirmLogout() {
        let result = confirm("Are you sure want to logout?");
        if (result) {
          showLoading();
          
          setTimeout(() => {
            document.getElementById("logoutForm").submit();
          }, 1000);
        }
      }
      function showLoading() {
        document.getElementById("loader").style.display = "block";
      }
      window.onload = function () {
        fetch("/check-session")
        .then(res => res.json())
        .then(data => {
          if (!data.logged_in) {
            window.location.href = "/login-page"
          }
        })
      }
      
    </script>
  </body>
</html>
