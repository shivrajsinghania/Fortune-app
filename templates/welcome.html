<!DOCTYPE html>
<html>
  <head>
    <title>Fortune.com</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #1e3a8a, #9333ea);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: 380px;
        padding: 15px;
      }

      .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        color: white;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 10px;
      }

      h2 {
        font-weight: 500;
        margin-bottom: 20px;
      }

      .btn {
        display: block;
        padding: 12px;
        margin: 10px 0;
        border-radius: 25px;
        text-decoration: none;
        color: white;
        font-size: 14px;
        transition: 0.3s;
      }

      .primary {
        background: linear-gradient(135deg, #4da6ff, #0066ff);
      }

      .secondary {
        background: rgba(255,255,255,0.2);
      }

      .btn:hover {
        transform: scale(1.03);
      }

      p {
        margin: 10px 0;
        font-size: 13px;
        opacity: 0.8;
      }
    </style>
  </head>

  <body>

    <div class="container">
      <div class="card">

        <h1>🚀 Fortune</h1>
        <h2>Build your future. Connect. Grow.</h2>

        <a href="/signup" class="btn primary">Create Account</a>

        <p>OR</p>

        <a href="/login-page" class="btn secondary">Login</a>

      </div>
    </div>
    <script>
      
    </script>
  </body>
</html>
