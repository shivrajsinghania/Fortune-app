<!DOCTYPE html>  
<html>  
  <head>  
    <style>  
      * {  
        margin: 0;  
        padding: 0;  
        box-sizing: border-box;  
        font-family: "Segoe UI", sans-serif;  
      }  

      body {  
        background: linear-gradient(135deg, #0f172a, #1e293b);  
        color: #fff;  
        display: flex;  
        justify-content: center;  
        align-items: center;  
        min-height: 100vh;  
      }  
      main {
        width: 100%;
        display: flex;
        justify-content: center;
      }
      section {
        width: 100%;
        max-width: 380px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        border: none;
      }
      .loginhead {  
        text-align: center;  
        margin-bottom: 20px;  
      }  

      .input-wrap {  
        margin-bottom: 15px;  
      }  

      label {  
        font-size: 13px;  
        color: #aaa;  
        display: block;  
        margin-bottom: 5px;  
      }  

      .field {  
        position: relative;  
      }  

      input {  
        width: 100%;  
        padding: 10px;  
        padding-right: 42px;  
        border-radius: 10px;  
        border: none;  
        outline: none;  
        background: rgba(255,255,255,0.08);  
        color: #fff;  
        font-size: 14px;  
        display: block;  
      }  

      input::placeholder {  
        color: #aaa;  
      }  

      .eye-btn {  
        position: absolute;  
        right: 12px;  
        top: 50%;  
        transform: translateY(-50%);  
        width: 18px;  
        height: 18px;  
        cursor: pointer;  
        color: #aaa;  
        display: block;  
      }  

      .eye-btn:hover {  
        color: #fff;  
      }  

      button {  
        width: 100%;  
        padding: 12px;  
        border-radius: 25px;  
        border: none;  
        background: linear-gradient(135deg, #4da6ff, #0066ff);  
        color: white;  
        font-size: 14px;  
        cursor: pointer;  
        transition: 0.3s;  
        margin-top: 5px;  
      }  

      button:hover {  
        transform: scale(1.03);  
        box-shadow: 0 5px 15px rgba(0,102,255,0.5);  
      }  

      .success {  
        background-color: #d4edda;  
        color: #155724;  
        border: 1px solid #c3e6cb;  
        padding: 12px;  
        border-radius: 4px;  
        margin-bottom: 15px;  
      }  

      .error {  
        background-color: #f8d7da;  
        color: #721c24;  
        border: 1px solid #f5c6cb;  
        padding: 12px;  
        border-radius: 4px;  
        margin-bottom: 15px;  
      }  

      .success, .error {  
        animation: fade 0.3s ease-in;  
      }  

      @keyframes fade {  
        from { opacity: 0; transform: translateY(-5px); }  
        to { opacity: 1; transform: translateY(0); }  
      }  
    </style>  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Fortune.com</title>  
  </head>  
  <body>  
    <main>  
      <section>  
        <div class="loginhead">  
          <h2>Login</h2>  
        </div>  

        {% with messages = get_flashed_messages(with_categories=True) %}  
          {% if messages %}  
            {% for category, msg in messages %}  
              <p class="{{ category }}">{{ msg }}</p>  
            {% endfor %}  
          {% endif %}  
        {% endwith %}    

        <div>  
          <form action="/login" method="post">  
            <div class="input-wrap">  
              <label>Enter a username: </label>  
              <input type="text" name="username" placeholder="Enter a username" required>  
            </div>  

            <div class="input-wrap">  
              <label>Enter a password: </label>  
              <div class="field">
                <input type="password" id="login_password" name="password" minlength="6" placeholder="Enter a password" required>  
                <svg class="eye-btn" onclick="togglePassword('login_password', this)" viewBox="0 0 24 24" fill="none">
                  <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6-10-6-10-6z" stroke="currentColor" stroke-width="2"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                </svg>
              </div>
            </div>  

            <button type="submit">Login</button>  
          </form>  
        </div>  
      </section>  
    </main>  

    <script>  
      function togglePassword(id, el) {
        let input = document.getElementById(id);

        if (input.type === "password") {
          input.type = "text";
          el.innerHTML = `
            <path d="M17.94 17.94A10.94 10.94 0 0112 19c-6 0-10-6-10-6a21.77 21.77 0 015.06-5.94M9.9 4.24A10.94 10.94 0 0112 5c6 0 10 6 10 6a21.77 21.77 0 01-4.06 5.94M1 1l22 22" stroke="currentColor" stroke-width="2"/>`;
        } else {
          input.type = "password";
          el.innerHTML = `
            <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6-10-6-10-6z" stroke="currentColor" stroke-width="2"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>`;
        }
      }
    </script>  
  </body>  
</html>
