<!DOCTYPE html>
<html>
<head>
  <title>Post</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/post.css') }}">
  <style>
  body {
    margin: 0;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    font-family: "Segoe UI", sans-serif;
    color: white;
  }
  /* CONTAINER */
  .container {
    max-width: 420px;
    margin: auto;
    padding: 10px;
  }
  .img {
    width: 100%;
    max-height: 440px;
    object-fit: cover;
    border-radius: 12px;
  }
  /* CAPTION */
  .caption {
    margin-top: 10px;
    font-weight: 500;
    text-align: center;
  }
  .total-post {
    margin: 7px;
    padding: 7px;
    background: #1e293b;
    border-radius: 10px;
  }
  </style>
</head>
<body>
  <div class="container">
    {% for post in posts %}
    <div class="total-post {% if post[0] == current_id %}active{% endif %}">
      {% set show_delete = True %}
      {% include "components/post.html" %}
    </div>
    {% endfor %}
  </div>
  {% include "components/comment_modal.html" %}
  <script>
    const currentUserId = {{ user_id }};
    window.onload = function() {
      let activePost = document.querySelector(".active");
      if (activePost) {
        activePost.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    };
  </script>
  <script src="{{ url_for('static', filename='js/post.js') }}"></script>
</body>
</html>
