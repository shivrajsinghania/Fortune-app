<!DOCTYPE html>
<html>
  <head>
    <title>Fortune.com</title>
  </head>
  <body>
    <!---navbar---->
    <div class="navbar">
      <a href="#">Share</a>
      <a href="#">Saved</a>
      <a href="#">setting</a>
    </div>
    
    <main>
      <section>
        <h3>Profile section</h3>
        {% if profile %}
        <p>Name: {{ profile[2] }}</p>
        <p>Bio: {{ profile[3] }}</p>
        <p>Links: {{ profile[4] }}</p>
        {% else %}
        <p>No profile found. Create one below.</p>
        {% endif %}
        
        <form action="/profile/update" method="post">
          <input type="text" name="name" placeholder="Enter your name:"><br><br>
          <input type="text" name="bio" placeholder="Enter your bio:"><br><br>
          <input type="text" name="links" placeholder="Enter links:"><br><br>
          <button type="submit">Save Profile</button>
        </form>
      </section>
    </main>
  </body>
</html>
