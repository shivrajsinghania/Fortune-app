<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta
    name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#0f172a;
    }

    body{
      display:flex;
      flex-direction:column;
    }

    /* APP */
    .chat-app{
      flex:1;
      display:flex;
      flex-direction:column;
      height:100%;
      background:#0f172a;
    }

    /* HEADER */
    .chat-header{
      height:70px;
      flex-shrink:0;
      display:flex;
      align-items:center;
      gap:14px;
      padding:0 16px;
      background:#111827;
      border-bottom:
      1px solid rgba(255,255,255,0.05);
    }

    .avatar{
      width:44px;
      height:44px;
      border-radius:50%;
      background:
      linear-gradient(
        135deg,
        #00ffcc,
        #00c2ff
      );
      display:flex;
      align-items:center;
      justify-content:center;
      color:black;
      font-weight:bold;
      font-size:18px;
    }

    .user-info h2{

      font-size:17px;

      color:white;
    }

    .user-info p{

      font-size:12px;

      color:#94a3b8;

      margin-top:2px;
    }

    /* MESSAGES */

    #messages{

      flex:1;

      overflow-y:auto;

      padding:14px;

      display:flex;

      flex-direction:column;

      gap:12px;

      background:
      linear-gradient(
        180deg,
        #0f172a,
        #111827
      );
    }

    /* MESSAGE */

    .message{

      max-width:80%;

      padding:12px 14px;

      border-radius:18px;

      word-wrap:break-word;

      line-height:1.4;

      font-size:15px;
    }

    /* RECEIVED */

    .received{

      align-self:flex-start;

      background:#1e293b;

      color:white;

      border-bottom-left-radius:5px;
    }

    /* SENT */

    .sent{

      align-self:flex-end;

      background:#00ffcc;

      color:black;

      border-bottom-right-radius:5px;
    }

    /* INPUT AREA */

    .input-area{

      flex-shrink:0;

      display:flex;

      align-items:center;

      gap:10px;

      padding:12px;

      background:#111827;

      border-top:
      1px solid rgba(255,255,255,0.05);
    }

    .input-area input{
      flex:1;
      height:48px;
      border:none;
      outline:none;
      padding:0 16px;
      border-radius:25px;
      background:#1e293b;
      color:white;
      font-size:15px;
    }

    .input-area input::placeholder{

      color:#94a3b8;
    }

    .input-area button{

      width:50px;
      height:50px;

      border:none;

      border-radius:50%;

      background:#00ffcc;

      color:black;

      font-size:18px;

      font-weight:bold;

      cursor:pointer;

      flex-shrink:0;
    }

    /* SCROLLBAR */

    #messages::-webkit-scrollbar{

      width:4px;
    }

    #messages::-webkit-scrollbar-thumb{

      background:#334155;

      border-radius:10px;
    }

  </style>
</head>

<body>
  <div class="chat-app">
    
    <!-- HEADER -->
    <div class="chat-header">
      <div class="avatar">
        {{ other_username[0].upper() }}
      </div>

      <div class="user-info">
        <h2>{{ other_username }}</h2>
        <p>Active now</p>
      </div>
    </div>

    <!-- MESSAGES -->
    <div id="messages">
      
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type message...">
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
  <script>
    const receiverId = {{ other_user_id }};
    const currentUserId = {{ current_user_id }};
    loadMessages();
    
    setInterval(loadMessages, 2000);
  </script>
</body>
</html>
