<!DOCTYPE html>
<html>
<head>
  <title>Create Post</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(135deg, #4da6ff, #0066ff);
      color: white;
      cursor: pointer;
    }

    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
      max-height: 200px;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Create Post</h2>
    <form id="postForm" enctype="multipart/form-data">
      <input type="file" name="image" required onchange="preview(event)">
      <img id="previewImg">
      <textarea name="caption" placeholder="Write caption..."></textarea>
      <select name="fit_type">
        <option value="cover">Crop (Fill)</option>
        <option value="contain">Full Image</option>
      </select>
      <select disabled>
        <option>Filters (Coming Soon)</option>
      </select>
      <button type="submit">Post</button>
    </form>
    <a onclick="goBack(event)" style="display:block; text-align:center; margin-top:10px; color:#aaa;">
      ← Back
    </a>
  </div>
  
  
  <script>
    document.getElementById("postForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      
      const formData = new FormData(this);
      
      try {
        const response = await fetch("/create-post", {
          method: "POST",
          body: formData
        });
        
        const data = await response.json();
        
        // not logged in
        if (data.redirect) {
          window.location.href = data.redirect;
          return;
        }
        
        //success
        if (data.success) {
          history.replaceState(null, "", "/feed");
          window.location.replace("/feed");
          
        } else {
          alert(data.message || "upload failed!");
        }
        
      }
      catch(error) {
        alert("upload failed!");
      }
    });
    
    function preview(event) {
      document.getElementById("previewImg").src =
      URL.createObjectURL(event.target.files[0]);
    }
    function goBack(event) {
      if (document.referrer) {
        event.preventDefault();
        history.back();
      }
    }
  </script>
</body>
</html>
