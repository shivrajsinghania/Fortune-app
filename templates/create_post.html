<!DOCTYPE html>
<html>
<head>
  <title>Create Post</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(135deg, #4da6ff, #0066ff);
      color: white;
      cursor: pointer;
    }

    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
      max-height: 200px;
      object-fit: cover;
    }
    
    /* ===== POST LOADER ===== */
    .post-loader{
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.88);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s ease;
    }
    .post-loader.show{
      opacity: 1;
      visibility: visible;
    }
    .upload-box{
      width: 280px;
      padding: 30px 22px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
      animation: uploadPopup 0.3s ease;
    }
    .upload-icon{
      width: 70px;
      height: 70px;
      margin: auto;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      background: linear-gradient(135deg,#4da6ff,#0066ff);
      animation: pulse 1.2s infinite;
    }
    .upload-box h3{
      margin-top: 18px;
      font-size: 20px;
    }
    .upload-box p{
      margin-top: 8px;
      color: #b8c1d1;
      font-size: 13px;
    }
    .progress-area{
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      margin-top: 22px;
      overflow: hidden;
    }
    .progress-line{
      width: 40%;
      height: 100%;
      border-radius: 20px;
      background: linear-gradient(90deg,#4da6ff,#7cc4ff);
      animation: moveLine 1s infinite linear;
    }
    @keyframes moveLine{
      0%{
        transform: translateX(-120%);
      }
      100%{
      transform: translateX(260%);
      }
    }
    @keyframes pulse{
    0%{
    transform: scale(1);
    }
    50%{
    transform: scale(1.08);
    }
    100%{
    transform: scale(1);
    }
    }
    @keyframes uploadPopup{
    from{
    transform: scale(0.85);
    opacity: 0;
    }
    to{
    transform: scale(1);
    opacity: 1;
    }
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Create Post</h2>
    <form id="postForm" enctype="multipart/form-data">
      <input type="file" name="image" required onchange="preview(event)">
      <img id="previewImg">
      <textarea name="caption" placeholder="Write caption..."></textarea>
      <select name="fit_type">
        <option value="cover">Crop (Fill)</option>
        <option value="contain">Full Image</option>
      </select>
      <select disabled>
        <option>Filters (Coming Soon)</option>
      </select>
      <button type="submit">Post</button>
    </form>
    <a onclick="goBack(event)" style="display:block; text-align:center; margin-top:10px; color:#aaa;">
      ← Back
    </a>
  </div>
  
  <!-- POST LOADER -->
  <div id="postLoader" class="post-loader">
    <div class="upload-box">
      <div class="upload-icon">
        ⬆
      </div>
      <h3 id="loaderTitle">Creating Post</h3>
      <p id="loaderText">Uploading your image...</p>
      <div class="progress-area">
        <div class="progress-line"></div>
      </div>
    </div>
  </div>
  <script>
    let compressedImage = null;
    const postLoader = document.getElementById("postLoader");
    
    function showPostLoader() {
      postLoader.classList.add("show");
    }
    function hidePostLoader() {
      postLoader.classList.remove("show");
    }
    function uploadLoaderContent(title, text) {
      document.getElementById("loaderTitle").textContent = title;
      document.getElementById("loaderText").textContent = text;
    }
    
    document.getElementById("postForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      showPostLoader();
      
      const formData = new FormData();
      formData.append(
        "image",
        compressedImage
      );
      
      formData.append(
        "caption",
        this.caption.value
      );
      
      formData.append(
        "fit_type",
        this.fit_type.value
      );
      
      try {
        const response = await fetch("/create-post", {
          method: "POST",
          body: formData
        });
        
        const data = await response.json();
        
        // not logged in
        if (data.redirect) {
          hidePostLoader();
          window.location.href = data.redirect;
          return;
        }
        
        //success
        if (data.success) {
          
          uploadLoaderContent(
            "Post Created!",
            "redirecting to feed..."
          );
          
          setTimeout(() => {
            history.replaceState(null, "", "/feed");
            window.location.replace("/feed");
          }, 1200);
          
        } else {
          hidePostLoader();
          alert(data.message || "upload failed!");
        }
        
      }
      catch(error) {
        hidePostLoader();
        alert("upload failed!");
      }
    });
    
    async function compressImage(file) {
      return new Promise((resolve) => {
        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = () => {
          
          //canvas
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          
          //resize settings
          const maxWidth = 1080;
          let width = img.width;
          let height = img.height;
          
          //maintain ratio 
          if (width > maxWidth) {
            height = (height * maxWidth) / width;
            width = maxWidth;
          }
          canvas.width = width;
          canvas.height = height;
          
          //draw resized Image
          ctx.drawImage(img, 0, 0, width, height);
          
          //compress Image
          canvas.toBlob(
            (blob) => {
              
              //create compressed file
              const compressedFile = 
              new File(
                [blob], 
                file.name,
                {
                  type: "image/jpeg"
                }
                );
              resolve(compressedFile);
              
            },
            "image/jpeg",
            0.7 //quality
          );
        };
      });
    };
    
    async function preview(event) {
      const file = event.target.files[0];
      
      //compress Image
      compressedImage = await compressImage(file);
      
      //preview compressed Image
      document.getElementById("previewImg").src = 
      URL.createObjectURL(compressedImage);
      
      console.log(
        "Original size:",
        (file.size / 1024 / 1024).toFixed(2),
        "MB"
      );
      
      console.log(
        "compressed size:",
        (compressedImage.size / 1024).toFixed(0),
        "KB"
      );
    }
    
    
    function goBack(event) {
      if (document.referrer) {
        event.preventDefault();
        history.back();
      }
    }
  </script>
</body>
</html>
