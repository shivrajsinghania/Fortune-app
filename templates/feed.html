<!DOCTYPE html>
<html>
  <head>
    <title>Fortune.com</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        background: #0f172a;
        font-family: Sans-Serif;
        color: white;
      }
      h2 {
        text-align: center;
      }
      .feed {
        margin: 20px;
        padding: 10px;
        background: #1e293b;
        border-radius: 10px;
      }
      .heart {
        width: 26px;
        height: 26px;
        fill: transparent;
        stroke: white;
        stroke-width: 2;
        transition: 0.25s ease;
      }
      .like-btn {
        background: none;
        border: none;
        cursor: pointer;
      }
      .like-btn.liked .heart {
        fill: #ff3040;
        stroke: #ff3040;
        filter: drop-shadow(0 0 6px #ff3040);
        transform: scale(1.1);
      }
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        align-items: flex-end;
      }
      .modal-content {
        background: #1e293b;
        height: 85%;
        width: 100%;
        border-radius: 20px 20px 0 0;
        display: flex;
        flex-direction: column;
      }
      /* comments scroll area */
      #commentsList {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
      }
      /* input fixed bottom */
      .comment-input {
        display: flex;
        gap: 8px;
        padding: 10px;
        border-top: 1px solid rgba(255,255,255,0.1);
      }
      .comment-input input {
        flex: 1;
        padding: 10px;
        border-radius: 20px;
        border: none;
      }
      .comment-input button {
        background: #4da6ff;
        border: none;
        padding: 10px 15px;
        border-radius: 20px;
        color: white;
      }
      .comment-btn {
        background: none;
        border: none;
        cursor: pointer;
      }
      .comment-icon {
        width: 24px;
        height: 24px;
        fill: transparent;
        stroke: white;
        stroke-width: 2;
        transition: 0.3s;
      }
      .comment-btn:hover .comment-icon {
        filter: drop-shadow(0 0 6px white);
      }
      body.modal-open {
        overflow: hidden;
      }
      .comment {
        margin-bottom: 12px;
      }
      .username {
        font-weight: bold;
        font-size: 14px;
      }
      .text {
        margin-left: 5px;
        font-size: 14px;
      }
      .actions {
        font-size: 12px;
        color: gray;
        margin-left: 5px;
      }
      .comment {
        padding:10px;
        border-bottom:1px solid rgba(255,255,255,0.05);
        transition: opacity 0.2s ease;
      }
      .comment-top {
        margin-bottom:4px;
      }
      .username {
        font-weight:600; font-size:13px; color:#cbd5f5;
      }
      .comment-body {
        display:flex; justify-content:space-between;
      }
      .text {
        max-width:70%;
      }
      .comment-actions {
        display:flex; gap:8px;
      }
      .icon-btn {
        background:none; border:none; cursor:pointer;
      }
      .icon {
        width:18px;
        height:18px;
        stroke:#aaa;
        fill: none;
        stroke-width: 2;
      }
      .icon-btn:hover .icon {
        stroke: white;
      }
      .delete-icon {
        stroke:#ff4d4d;
      }
    </style>
  </head>
  <body>
    <h2>Feed</h2>
    
    {% for post in posts %}
    <div class="feed">
      <p><strong>@{{ post[6] }}</strong></p>
      <img src="{{ post[2] }}" style="width:100%; height:auto; object-fit: {{ post[5] or 'contain' }}; border-radius:10px; display:block;">
      <button class="like-btn {% if post[7] %}liked{% endif %}" onclick="likePost({{ post[0] }}, this)">
        <svg class="heart" viewBox="0 0 24 24">
          <path d="M12 21s-7-5.2-9.5-8.3C.5 9.5 2.5 5 6.5 5 
           9 5 10.5 6.5 12 8 
           13.5 6.5 15 5 17.5 5 
           21.5 5 23.5 9.5 21.5 12.7 
           19 15.8 12 21 12 21z"/>
        </svg>
      </button>
      <span class="like-count">{{ post[8] }}</span>
      <button class="comment-btn" onclick="openComments({{ post[0] }})">
        <svg viewBox="0 0 24 24" class="comment-icon">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
        </svg>
      </button>
      <span class="comment-count">{{ post[9] }}</span>
      <p>{{ post[4] }}</p>
    </div>
    {% endfor %}
    
    <div id="commentModal" class="modal" onclick="outsideClick(event)">
      <div class="modal-content" onclick="event.stopPropagation()">
        <h2>Comments</h2>
        
        <div id="commentsList"></div>
        
        <div class="comment-input">
          <input type="text" id="commentText" placeholder="Write a comment...">
          <button onclick="sendComment()">Send</button>
        </div>
      </div>
    </div>
    
    <script>
      
      let currentUserId = {{ user_id or 0 }};
      
      function likePost(postId, btn) {
        fetch(`/like/${postId}`, {
          method: "POST"
        })
        .then(res => res.json())
        .then(data => {
          btn.nextElementSibling.innerText = data.likes;
          
          if (data.liked) {
            btn.classList.add("liked");
          } else {
            btn.classList.remove("liked");
          }
        });
      }
      let currentPostId = null;
      
      function openComments(postId) {
        document.body.classList.add("modal-open");
        currentPostId = postId;
        document.getElementById("commentModal").style.display = "flex";
        if (!history.state || !history.state.modal) {
          history.pushState({modal: true}, "");
        }
        fetch(`/comments/${postId}`)
        .then(res => res.json())
        .then(data => {
          let html = "";
          data.forEach(c => {
            html += `
            <div class="comment" data-id="${c[0]}">
            <div class="comment-top">
            <span class="username">@${c[2]}</span>
            </div>
            <div class="comment-body">
            <span class="text">${c[1]}</span>
            <div class="comment-actions">
            <!-- reply -->
            <button class="icon-btn">
            <svg viewBox="0 0 24 24" class="icon">
            <path d="M10 9V5l-7 7 7 7v-4c5 0 8 1 11 5-1-7-4-11-11-11z"/>
            </svg>
            </button>
            <!-- like -->
            <button class="icon-btn">
            <svg viewBox="0 0 24 24" class="icon">
            <path d="M12 21s-7-5.2-9.5-8.3C.5 9.5 2.5 5 6.5 5 
            9 5 10.5 6.5 12 8 
            13.5 6.5 15 5 17.5 5 
            21.5 5 23.5 9.5 21.5 12.7 
            19 15.8 12 21 12 21z"/>
            </svg>
            </button>
            <!-- delete -->
            ${parseInt(c[3]) === parseInt(currentUserId) ? `
            <button class="icon-btn delete" onclick="confirmDeleteComment(${c[0]})">
            <svg viewBox="0 0 24 24" class="icon delete-icon">
            <path d="M6 6l12 12M18 6l-12 12"/>
            </svg>
            </button>
            ` : ""}
            </div>
            </div>
            </div>`;
          });
          document.getElementById("commentsList").innerHTML = html;
        });
      }
      window.onpopstate = function(event) {
        if (document.getElementById("commentModal").style.display === "flex") {
          closeComments();
        }
      };
      function closeComments() {
        document.body.classList.remove("modal-open");
        document.getElementById("commentModal").style.display = "none";
        
        if (history.state && history.state.modal) {
          history.back();
        }
      }
      function sendComment() {
        let text = document.getElementById("commentText").value;
        fetch(`/add-comment/${currentPostId}`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({text: text})
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            let newComment = `
            <div class="comment" data-id="${data.comment_id}">
            <div class="comment-top">
            <span class="username">@${data.username}</span>
            </div>
            <div class="comment-body">
            <span class="text">${data.text}</span>
            <div class="comment-actions">
            <button class="icon-btn">
            <svg viewBox="0 0 24 24" class="icon">
            <path d="M10 9V5l-7 7 7 7v-4c5 0 8 1 11 5-1-7-4-11-11-11z"/>
            </svg>
            </button>
            <button class="icon-btn">
            <svg viewBox="0 0 24 24" class="icon">
            <path d="M12 21s-7-5.2-9.5-8.3C.5 9.5 2.5 5 6.5 5 
            9 5 10.5 6.5 12 8 
            13.5 6.5 15 5 17.5 5 
            21.5 5 23.5 9.5 21.5 12.7 
            19 15.8 12 21 12 21z"/>
            </svg>
            </button>
            ${parseInt(data.user_id) === parseInt(currentUserId) ? `
            <button class="icon-btn delete" onclick="confirmDeleteComment(${data.comment_id})">
            <svg viewBox="0 0 24 24" class="icon delete-icon">
            <path d="M6 6l12 12M18 6l-12 12"/>
            </svg>
            </button>
            ` : ""}
            </div>
            </div>
            </div>`;
            document.getElementById("commentsList").innerHTML = newComment + document.getElementById("commentsList").innerHTML;
            document.getElementById("commentText").value = "";
            let countElement = document.querySelector(
              `.comment-btn[onclick="openComments(${currentPostId})"]`
            ).nextElementSibling;
            countElement.innerText = parseInt(countElement.innerText) + 1;
          }
        });
      }
      function outsideClick(e) {
        if (e.target.id === "commentModal") {
          closeComments();
        }
      }
      function confirmDeleteComment(commentId) {
        if (confirm("Delete this comment?")) {
          deleteComment(commentId);
        }
      }
      function deleteComment(commentId) {
        fetch(`/delete-comment/${commentId}`, {
          method: "POST"
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            let el = document.querySelector(`.comment[data-id="${commentId}"]`);
            if (el) {
              el.style.opacity = "0";
              setTimeout(() => {
                el.remove();
                
                let countElement = document.querySelector(
                  `.comment-btn[onclick="openComments(${currentPostId})"]`
                ).nextElementSibling;
                countElement.innerText = Math.max(
                  0,
                  parseInt(countElement.innerText) - 1
                );
              }, 200);
            }
          }
        });
      }
    </script>
  </body>
</html>
