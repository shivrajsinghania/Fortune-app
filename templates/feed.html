<!DOCTYPE html>
<html>
  <head>
    <title>Fortune.com</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        background: #0f172a;
        font-family: Sans-Serif;
        color: white;
      }
      h2 {
        text-align: center;
      }
      .feed {
        margin: 20px;
        padding: 10px;
        background: #1e293b;
        border-radius: 10px;
      }
      .heart {
        width: 26px;
        height: 26px;
        fill: transparent;
        stroke: white;
        stroke-width: 2;
        transition: 0.25s ease;
      }
      .like-btn {
        background: none;
        border: none;
        cursor: pointer;
      }
      .like-btn.liked .heart {
        fill: #ff3040;
        stroke: #ff3040;
        filter: drop-shadow(0 0 6px #ff3040);
        transform: scale(1.1);
      }
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        align-items: flex-end;
      }
      .modal-content {
        background: #1e293b;
        height: 85%;
        width: 100%;
        border-radius: 20px 20px 0 0;
        display: flex;
        flex-direction: column;
      }
      /* comments scroll area */
      #commentsList {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
      }
      /* input fixed bottom */
      .comment-input {
        display: flex;
        gap: 8px;
        padding: 10px;
        border-top: 1px solid rgba(255,255,255,0.1);
      }
      .comment-input input {
        flex: 1;
        padding: 10px;
        border-radius: 20px;
        border: none;
      }
      .comment-input button {
        background: #4da6ff;
        border: none;
        padding: 10px 15px;
        border-radius: 20px;
        color: white;
      }
      .comment-btn {
        background: none;
        border: none;
        cursor: pointer;
      }
      .comment-icon {
        width: 24px;
        height: 24px;
        fill: transparent;
        stroke: white;
        stroke-width: 2;
        transition: 0.3s;
      }
      .comment-btn:hover .comment-icon {
        filter: drop-shadow(0 0 6px white);
      }
      body.modal-open {
        overflow: hidden;
      }
      .comment {
        margin-bottom: 12px;
      }
      .username {
        font-weight: bold;
        font-size: 14px;
      }
      .text {
        margin-left: 5px;
        font-size: 14px;
      }
      .actions {
        font-size: 12px;
        color: gray;
        margin-left: 5px;
      }
    </style>
  </head>
  <body>
    <h2>Feed</h2>
    
    {% for post in posts %}
    <div class="feed">
      <p><strong>@{{ post[5] }}</strong></p>
      <img src="{{ post[2] }}" style="width:100%; border-radius:10px;">
      <button class="like-btn {% if post[6] %}liked{% endif %}" onclick="likePost({{ post[0] }}, this)">
        <svg class="heart" viewBox="0 0 24 24">
          <path d="M12 21s-7-5.2-9.5-8.3C.5 9.5 2.5 5 6.5 5 
           9 5 10.5 6.5 12 8 
           13.5 6.5 15 5 17.5 5 
           21.5 5 23.5 9.5 21.5 12.7 
           19 15.8 12 21 12 21z"/>
        </svg>
      </button>
      <span class="like-count">{{ post[7] }}</span>
      <button class="comment-btn" onclick="openComments({{ post[0] }})">
        <svg viewBox="0 0 24 24" class="comment-icon">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
        </svg>
      </button>
      <span class="comment-count">{{ post[8] }}</span>
      <p>{{ post[4] }}</p>
    </div>
    {% endfor %}
    
    <div id="commentModal" class="modal" onclick="outsideClick(event)">
      <div class="modal-content" onclick="event.stopPropagation()">
        <h2>Comments</h2>
        
        <div id="commentsList"></div>
        
        <div class="comment-input">
          <input type="text" id="commentText" placeholder="Write a comment...">
          <button onclick="sendComment()">Send</button>
        </div>
      </div>
    </div>
    
    <script>
      
      function likePost(postId, btn) {
        fetch(`/like/${postId}`, {
          method: "POST"
        })
        .then(res => res.json())
        .then(data => {
          btn.nextElementSibling.innerText = data.likes;
          
          if (data.liked) {
            btn.classList.add("liked");
          } else {
            btn.classList.remove("liked");
          }
        });
      }
      let currentPostId = null;
      
      function openComments(postId) {
        document.body.classList.add("modal-open");
        currentPostId = postId;
        document.getElementById("commentModal").style.display = "flex";
        
        history.pushState({modal: true}, "");
        fetch(`/comments/${postId}`)
        .then(res => res.json())
        .then(data => {
          let html = "";
          data.forEach(c => {
            html += `
            <div class="comment">
            <div class="username">@${c[1]}</div>
            <div class="text">${c[0]}</div>
            <div class="actions">Reply • Like</div>
            </div>`;
          });
          document.getElementById("commentsList").innerHTML = html;
        });
      }
      window.onpopstate = function(event) {
        if (document.getElementById("commentModal").style.display === "flex") {
          closeComments();
        }
      };
      function closeComments() {
        document.body.classList.remove("modal-open");
        document.getElementById("commentModal").style.display = "none";
      }
      function sendComment() {
        let text = document.getElementById("commentText").value;
        
        fetch(`/add-comment/${currentPostId}`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({text: text})
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            let newComment = `
            <div class="comment">
            <div class="username">@${data.username}</div>
            <div class="text">${data.text}</div>
            </div>`;
            document.getElementById("commentsList").innerHTML = newComment + document.getElementById("commentsList").innerHTML;
            document.getElementById("commentText").value = "";
            
            let countElement = document.querySelector(
              `.comment-btn[onclick="openComments(${currentPostId})"]`
            ).nextElementSibling;
            
            countElement.innerText = parseInt(countElement.innerText) + 1;
          }
        });
      }
      function outsideClick(e) {
        if (e.target.id === "commentModal") {
          closeComments();
        }
      }
    </script>
  </body>
</html>
